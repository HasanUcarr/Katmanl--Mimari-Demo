spring.application.name=demo
# PostgreSQL Bağlantı Adresi (localhost'ta çalışan kampusdb)
spring.datasource.url=jdbc:postgresql://localhost:5432/kampusdb

# macOS ortamında PostgreSQL genellikle mevcut işletim sistemi kullanıcısı ile çalışır.
# Güvenlik gereği kendi bilgisayarınızın macOS kullanıcı adını yazmalısınız.
# (Terminalde 'whoami' yazarak öğrenebilirsiniz, muhtemelen 'hasanucar' olacaktır).
spring.datasource.username=hasanucar
spring.datasource.password=

# Hibernate/JPA Ayarları
# update: Proje her çalıştığında Java tarafındaki Entity sınıflarına bakar, 
# veritabanında bu tablo yoksa otomatik olarak oluşturur veya günceller.
spring.jpa.hibernate.ddl-auto=update
# Konsolda yazılan SQL sorgularını gösterir (öğrenme aşamasında çok faydalıdır)
spring.jpa.show-sql=true